<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartorisk - Résilience Urbaine Bordeaux</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link href='./node_modules/maplibre-gl/dist/maplibre-gl.css' rel='stylesheet' />
    <script src='./node_modules/maplibre-gl/dist/maplibre-gl.js'></script>
    <header>
        <a href="./" class="logo-link">
            <img src="./images/Group 37229.png" alt="CART ORISK" class="logo">
        </a>
    </header>
</head>
<body>
    <!-- Barre de recherche centrée -->
    <form action="" method="GET" onsubmit="handleSearch(event)">
        <div class="search-bar">
            <input type="text" id="search-input" placeholder="Chercher une adresse...">
            <div class="search-icon" onclick="handleSearch(event)">
                <i class="fas fa-magnifying-glass"></i>
            </div>
        </div>
    </form>
    
    <!-- Carte interactive -->
    <div id="map"></div>
    
    <!-- Popup d'informations (bas gauche) -->
    <div id="info-card">
        <div class="info-card-header">
            <h2 id="info-title">Informations</h2>
            <button class="info-card-close" onclick="closePopup()">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div id="info-card-body">
            Cliquez sur un carré ou entrez une adresse pour voir les détails
        </div>
    </div>
    
    <!-- Légende avec 7 niveaux de résilience -->
    <div id="legend">
        <h3>Résilience</h3>
        <small>Score de 0 à 100</small>
        <div class="legend-item">
            <div class="legend-color" style="background-color: #228B22;"></div>
            <strong>A+</strong> - Très résilient (76-100)
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background-color: #90EE90;"></div>
            <strong>A</strong> - Résilient (56-75)
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background-color: #FFD700;"></div>
            <strong>B</strong> - Moyen (41-55)
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background-color: #FFA500;"></div>
            <strong>C</strong> - Fragile (26-40)
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background-color: #FF6347;"></div>
            <strong>D</strong> - Très fragile (18-25)
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background-color: #DC143C;"></div>
            <strong>E</strong> - Critique (10-17)
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background-color: #8B0000;"></div>
            <strong>F</strong> - Critique extrême (0-9)
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
