<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartorisk - Résilience Urbaine Bordeaux</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link href='../node_modules/maplibre-gl/dist/maplibre-gl.css' rel='stylesheet' />
    <script src='../node_modules/maplibre-gl/dist/maplibre-gl.js'></script>
    <header>
        <a href="./" class="logo-link">
            <img src="./images/Group 37229.png" alt="CART ORISK" class="logo">
        </a>
    </header>
</head>
<body>
    <form action="" method="GET" onsubmit="handleSearch(event)">
        <div class="search-bar">
            <input type="text" id="search-input" placeholder="Chercher une adresse..." onchange="searchAddress()">
            <div class="search-icon" onclick="handleSearch(event)">
                <i class="fas fa-magnifying-glass"></i>
            </div>
        </div>
    </form>
    
    <div id="map"></div>
    
    <div id="info-card">
        <div class="info-card-header">
            <h2 id="info-title">Informations</h2>
            <button class="info-card-close" onclick="closePopup()">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div id="info-card-body">
            Cliquez sur un carré ou entrez une adresse pour voir les détails
        </div>
    </div>
    
    <script src="app.js"></script>
</body>

</html>
